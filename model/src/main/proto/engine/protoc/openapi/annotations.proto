syntax = "proto3";

package engine.protoc.openapi;

option java_package = "com.engine.protoc.openapi";
option java_multiple_files = true;

import "engine/protoc/openapi/openapi.proto";
import "engine/protoc/openapi/model/operation.proto";
import "engine/protoc/openapi/model/schema.proto";

import "google/protobuf/descriptor.proto";

extend .google.protobuf.FileOptions {
    // Adds the ability to add an OpenAPI definition to a proto file
    .engine.protoc.openapi.OpenAPI file = 20231016;
}

extend .google.protobuf.ServiceOptions {
    // Adds the ability to add an OpenAPI definition to a proto `service`
    .engine.protoc.openapi.OpenAPI service = 20231016;

    // Adds the ability to define tags to be applied to all RPCs (OAS Operations) within a gRPC service.
    // Fully enriched tags must be created within one of the available layers of OpenAPI annotation (at the file or service annotation).
    repeated string tags = 202310162;
}

extend .google.protobuf.MethodOptions {
    // Adds the ability to add an OpenAPI operation to a rpc in a proto `service`
    .engine.protoc.openapi.model.Operation method = 20231016;

    // When true, the RPC's request body schema is inlined at the use site instead of emitted as
    // a `$ref` into `components/schemas`.  Transitive: messages reached only through this inline
    // path are themselves inlined; messages also reachable through a non-inlined path remain in
    // components and are `$ref`'d from the inline expansion.
    optional bool inline_request_schema = 202310162;

    // Same as `inline_request_schema`, but for the RPC's response body.
    optional bool inline_response_schema = 202310163;
}

extend .google.protobuf.MessageOptions {
    // Adds the ability to add an OpenAPI schema to a proto `message`
    .engine.protoc.openapi.model.Schema message = 20231016;
}

extend .google.protobuf.FieldOptions {
    // Adds the ability to add an OpenAPI schema to a field in a proto `message`
    .engine.protoc.openapi.model.Schema field = 20231016;

    // When true on a message-typed field, the referenced message's schema is inlined at the
    // field site instead of emitted as a `$ref` into `components/schemas`.  Transitive:
    // messages reached only through this inline path are themselves inlined; messages also
    // reachable through a non-inlined path remain in components and are `$ref`'d from the
    // inline expansion.  Ignored on scalar fields; the per-enum `(engine.protoc.openapi.inline)`
    // annotation continues to govern enum inlining.
    //
    // Named `inline_schema` to avoid a Java symbol clash with the `(engine.protoc.openapi.inline)`
    // extension on `EnumOptions` (both generate static fields on `Annotations.java`).
    optional bool inline_schema = 202310162;
}

extend .google.protobuf.EnumOptions {
    // Adds the ability to add an OpenAPI schema to a proto `enum`
    .engine.protoc.openapi.model.Schema enum = 20231016;
    // When true, this enum will be inlined when used instead of created as a separate schema in components.
    optional bool inline = 202310162;
}

extend .google.protobuf.EnumValueOptions {
    // When true, suppress this enum value from OAS schema output.
    // This is helpful for the conventional "default" value of proto enums with the assigned 0 number.
    optional bool suppress = 202310162;
}
