syntax = "proto3";

package swagger.api;

option java_package = "com.swagger.api";
option java_multiple_files = true;

import "engine/protoc/openapi/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

option (.engine.protoc.openapi.file) = {
    openapi: "3.1.0"
    info: {
        title: "Swagger Petstore - OpenAPI 3.0"
        description: "This is a sample Pet Store Server based on the OpenAPI 3.0 specification.  You can find out more about\nSwagger at [https://swagger.io](https://swagger.io). In the third iteration of the pet store, we've switched to the design first approach!\nYou can now help us improve the API whether it's by making changes to the definition itself or to the code.\nThat way, with time, we can improve the API in general, and expose some of the new features in OAS3.\n\nSome useful links:\n- [The Pet Store repository](https://github.com/swagger-api/swagger-petstore)\n- [The source API definition for the Pet Store](https://github.com/swagger-api/swagger-petstore/blob/master/src/main/resources/openapi.yaml)"
        termsOfService: "https://swagger.io/terms/"
        contact: { email: "apiteam@swagger.io" }
        license: {
            name: "Apache 2.0"
            url: "https://www.apache.org/licenses/LICENSE-2.0.html"
        }
        version: "1.0.27"
    }
    servers: [{ url: "https://petstore3.swagger.io/api/v3" }]
    tags: [
        {
            name: "pet"
            description: "Everything about your Pets"
            external_docs: { description: "Find out more" url: "https://swagger.io" }
        },
        {
            name: "store"
            description: "Access to Petstore orders"
            external_docs: { description: "Find out more about our store" url: "https://swagger.io" }
        },
        {
            name: "user"
            description: "Operations about user"
        }
    ]
    external_docs: { description: "Find out more about Swagger" url: "https://swagger.io" }
    components: {
        security_schemes: {
            key: "petstore_auth"
            value: {
                security_scheme: {
                    oauth2: {
                        flows: {
                            implicit: {
                                authorization_url: "https://petstore3.swagger.io/oauth/authorize"
                                scopes: { key: "write:pets" value: "modify pets in your account" }
                                scopes: { key: "read:pets" value: "read your pets" }
                            }
                        }
                    }
                }
            }
        }
        security_schemes: {
            key: "api_key"
            value: {
                security_scheme: {
                    api_key: { name: "api_key" in: "header" }
                }
            }
        }
    }
};

// ---------------------------------------------------------------------------
// Domain messages
// ---------------------------------------------------------------------------

message Category {
    int64 id = 1;
    string name = 2;
}

message Tag {
    int64 id = 1;
    string name = 2;
}

message Pet {
    int64 id = 1;
    string name = 2;
    .swagger.api.Category category = 3;
    repeated string photo_urls = 4;
    repeated .swagger.api.Tag tags = 5;
    // pet status in the store
    string status = 6 [(.engine.protoc.openapi.field) = {
        object: {
            enum: { [type.googleapis.com/google.protobuf.Value] { string_value: "available" } }
            enum: { [type.googleapis.com/google.protobuf.Value] { string_value: "pending" } }
            enum: { [type.googleapis.com/google.protobuf.Value] { string_value: "sold" } }
        }
    }];
}

message Order {
    int64 id = 1;
    int64 pet_id = 2;
    int32 quantity = 3;
    // date-time
    string ship_date = 4;
    // Order Status
    string status = 5 [(.engine.protoc.openapi.field) = {
        object: {
            enum: { [type.googleapis.com/google.protobuf.Value] { string_value: "placed" } }
            enum: { [type.googleapis.com/google.protobuf.Value] { string_value: "approved" } }
            enum: { [type.googleapis.com/google.protobuf.Value] { string_value: "delivered" } }
        }
    }];
    bool complete = 6;
}

message User {
    int64 id = 1;
    string username = 2;
    string first_name = 3;
    string last_name = 4;
    string email = 5;
    string password = 6;
    string phone = 7;
    // User Status
    int32 user_status = 8;
}

message ApiResponse {
    int32 code = 1;
    string type = 2;
    string message = 3;
}

// ---------------------------------------------------------------------------
// Request messages
// ---------------------------------------------------------------------------

message FindPetsByStatusRequest {
    string status = 1;
}

message FindPetsByTagsRequest {
    repeated string tags = 1;
}

message PetIdRequest {
    int64 pet_id = 1;
}

message UpdatePetWithFormRequest {
    int64 pet_id = 1;
    string name = 2;
    string status = 3;
}

message DeletePetRequest {
    string api_key = 1;
    int64 pet_id = 2;
}

message UploadFileRequest {
    int64 pet_id = 1;
    string additional_metadata = 2;
}

message OrderIdRequest {
    int64 order_id = 1;
}

message LoginUserRequest {
    string username = 1;
    string password = 2;
}

message UsernameRequest {
    string username = 1;
}

// Used for list input (array of User)
message UserListRequest {
    repeated .swagger.api.User users = 1;
}

