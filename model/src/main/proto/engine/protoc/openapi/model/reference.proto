syntax = "proto3";

package engine.protoc.openapi.model;

// A simple object to allow referencing other components in the OpenAPI Description, internally and externally.
//
// The `$ref` string value contains a URI [RFC3986](https://tools.ietf.org/html/rfc3986), which identifies the value being referenced.
//
// See the rules for resolving [Relative References](https://swagger.io/specification/#relative-references-in-api-description-uris).
message Reference {

  oneof ref_type {
    // REQUIRED.
    // The reference identifier.
    // This MUST be in the form of a URI.
    string uri_ref = 1;

    // A fully qualified service and method name used to resolve a reference from the protoc
    // compilation context, for example:
    // `engine.shop.lodging.service.v1.LodgingShoppingService#FindBestOffers`
    // The referenced RPC must exist, have a `(google.api.http)` option, and be present in the
    // set of files passed to the current protoc invocation.
    string proto_ref = 2;
  }

  // A short summary which by default SHOULD override that of the referenced component.
  // If the referenced object-type does not allow a summary field, then this field has no effect.
  optional string summary = 3;

  // A description which by default SHOULD override that of the referenced component.
  // CommonMark syntax MAY be used for rich text representation.
  // If the referenced object-type does not allow a description field, then this field has no effect.
  optional string description = 4;
}
