syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/model/reference.proto";
import "engine/protoc/openapi/model/response_object.proto";

message ResponseOrReference {
  oneof type {
    .engine.protoc.openapi.model.ResponseObject response_object = 1;
    .engine.protoc.openapi.model.Reference reference = 2;
  }
}
