// This file uses proto2 syntax to exercise descriptor features that are not
// available in proto3: extension ranges in messages, and extension fields
// defined inside a message body.

syntax = "proto2";

package engine.protoc.utils;

// A proto2 message that declares extension ranges.
// Extension ranges allow other messages or files to define extension fields
// whose field numbers fall within the declared range.  Only proto2 messages
// may declare extension ranges.
message Proto2ExtensionTarget {
    optional string name = 1;

    // comment on extension range in Proto2ExtensionTarget
    extensions 100 to 200;
}

// A proto2 message that defines extension fields inside its body.
// These `extend` blocks make the enclosing message the "owner" of the
// extension descriptors; they appear in DescriptorProto.extension (field 6).
message Proto2MessageWithExtensions {
    // comment on extension defined inside Proto2MessageWithExtensions
    extend Proto2ExtensionTarget {
        // An extension string field that extends Proto2ExtensionTarget.
        optional string container_string = 100;
    }
}

// A file-level extend block.  The extension descriptor appears in
// FileDescriptorProto.extension (field 7), not inside any message.
// comment on file-level extension
extend Proto2ExtensionTarget {
    // A file-level extension field.
    optional string file_level_string = 101;
}
