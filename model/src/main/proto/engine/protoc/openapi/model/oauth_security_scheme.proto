syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;
option java_outer_classname = "OAuthSecuritySchemeProto";

import "engine/protoc/openapi/model/oauth_flows.proto";


message OAuthSecurityScheme {
  // REQUIRED.
  // An object containing configuration information for the flow types supported.
  .engine.protoc.openapi.model.OAuthFlows flows = 1;
}
