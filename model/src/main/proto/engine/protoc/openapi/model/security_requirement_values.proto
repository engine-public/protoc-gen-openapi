syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

// Wrapper for the list of scope names (or role names) associated with a single entry in a
// [Security Requirement Object](https://swagger.io/specification/#security-requirement-object).
//
// For `oauth2` and `openIdConnect` security schemes, `values` holds the list of required OAuth
// scope names; the list MAY be empty if no specific scope is required.
// For all other security scheme types, `values` MAY hold a list of role names required for
// execution, but these are not otherwise defined or exchanged in-band.
//
// This wrapper message exists because protobuf map values cannot be `repeated` scalar types
// directly; the map in [SecurityRequirement] maps scheme names to this message.
message SecurityRequirementValues {
  repeated string values = 1;
}
