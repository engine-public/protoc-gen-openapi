syntax = "proto3";

package engine.protoc.openapi.model;

import "engine/protoc/openapi/model/media_type.proto";

// Describes a single request body.
message RequestBody {
  // A brief description of the request body. This could contain examples of use.
  // [CommonMark syntax](https://spec.commonmark.org/) MAY be used for rich text representation.
  optional string description = 1;

  // REQUIRED.
  // The content of the request body.
  // The key is a media type or [media type range](https://tools.ietf.org/html/rfc7231#appendix--d) and the value describes it.
  // For requests that match multiple keys, only the most specific key is applicable. e.g. `"text/plain"` overrides `"text/*"`
  map<string, .engine.protoc.openapi.model.MediaType> content = 2;

  // Determines if the request body is required in the request.
  // Defaults to `false`.
  optional bool required = 3;
}
