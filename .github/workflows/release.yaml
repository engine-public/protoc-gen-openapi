name: Release

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: "The version to build.  It must be semver-compliant, and must not be for a tag that already exists."
        required: true
        type: string
      pre_release:
        description: "Is this a pre-release? (Changes the visibility on GitHub.)"
        required: true
        type: boolean
concurrency:
  group: all
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yaml
    secrets: inherit
    with:
      build_version: ${{ inputs.build_version }}

  native-build:
    uses: ./.github/workflows/native-build.yaml
    secrets: inherit
    with:
      build_version: ${{ inputs.build_version }}

  release:
    runs-on: ubuntu-latest
    needs: [build, native-build]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: 'true'
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "${{ github.triggering_actor }}"
          git config --global user.email 'actions.ci@engine.com'

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@f744c72a42b1995d7b0cbc314bde4bace7ac1fe1
        with:
          java-version: '21'
          distribution: 'graalvm-community'

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # https://github.com/gradle/actions/releases/tag/v6.1.0

      - name: Download JVM Distribution Artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/dist/jvm
          pattern: dist-jvm-*
          merge-multiple: true

      - name: Download Native Distribution Artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/dist/native
          pattern: dist-native-*
          merge-multiple: true

      - name: List Artifacts Directory
        run: |
          ls -alhR build/

      - name: Stage Maven Central
        env:
          ENGINE_BUILD_VERSION: ${{ inputs.build_version }}
          ENGINE_NATIVE_BIN_DIR: build/dist/native
        run: |
          ./gradlew stageMavenCentral

      - name: Git Tag
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag --annotate "${{ inputs.build_version }}" --message="${{ inputs.build_version }}"
          git push origin "${{ inputs.build_version }}"

      - name: JReleaser Deploy (Maven Central)
        env:
          ENGINE_BUILD_VERSION: ${{ inputs.build_version }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ vars.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_STAGE: upload
          JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ vars.JRELEASER_MAVENCENTRAL_USERNAME }}
        if: success()
        run: |
          ./gradlew -xstageMavenCentral jreleaserDeploy

      - name: GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.build_version }}" --generate-notes --prerelease=${{ inputs.pre_release }} --verify-tag
          gh release upload "${{ inputs.build_version }}" \
            build/dist/jvm/*-cyclonedx.json \
            build/dist/jvm/*-model-protos-*.zip \
            build/dist/native/*