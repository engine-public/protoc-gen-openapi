syntax = "proto3";

package engine.protoc.openapi;

option java_package = "com.engine.protoc.openapi";
option java_multiple_files = true;

import "engine/protoc/openapi/openapi.proto";
import "engine/protoc/openapi/model/operation.proto";
import "engine/protoc/openapi/model/schema.proto";

import "google/protobuf/any.proto";
import "google/protobuf/descriptor.proto";
import "google/rpc/code.proto";

// File-level OpenAPI annotation: applied via `(engine.protoc.openapi.file)` on a proto file.
message File {
    // OpenAPI definition merged into the emitted document for this file.
    .engine.protoc.openapi.OpenAPI openapi = 1;
}

// Service-level OpenAPI annotation: applied via `(engine.protoc.openapi.service)` on a proto service.
message Service {
    // OpenAPI definition merged into the emitted document for this service.
    .engine.protoc.openapi.OpenAPI openapi = 1;

    // Tags applied to every RPC (OAS Operation) within this gRPC service.
    // Fully enriched tags must be created within one of the available layers of OpenAPI annotation
    // (at the file or service annotation).
    repeated string tags = 2;

    // Sort key controlling the order this service's paths (and its auto-generated service tag,
    // when `autoTagServices` is enabled) appear in the emitted OpenAPI document.  Services with
    // an explicit `index_order` are positioned by that integer; services without one fall back
    // to their encounter ordinal across the target file set (the first service is index 0, the
    // second is 1, etc.).  Negative values place a service ahead of the un-annotated baseline,
    // indices may be sparse, and ties are broken by source order (stable sort).
    optional int32 index_order = 3;
}

// Method-level OpenAPI annotation: applied via `(engine.protoc.openapi.method)` on an RPC.
message Method {
    // OpenAPI Operation definition for this RPC.
    .engine.protoc.openapi.model.Operation operation = 1;

    // When true, the RPC's request body schema is inlined at the use site instead of emitted as
    // a `$ref` into `components/schemas`.  Transitive: messages reached only through this inline
    // path are themselves inlined; messages also reachable through a non-inlined path remain in
    // components and are `$ref`'d from the inline expansion.
    optional bool inline_request = 2;

    // Same as `inline_request`, but for the RPC's response body.
    optional bool inline_response = 3;

    // Shortcut for error scenario responses.  Each entry expands into a `responses[status]`
    // entry whose schema is an inline `google.rpc.Status` body with `details.items` $ref'ing
    // the named error class.  The Status envelope is never added to `components/schemas` —
    // it is an Envoy implementation detail, not a reusable OAS schema unit.  Equivalent to
    // writing the full `operation.responses` tree by hand but one line per error case.
    // See [`ErrorResponse`] for the per-entry semantics.
    //
    // Conflicts (same status appearing in both `operation.responses` and `error_responses`,
    // or twice in `error_responses` itself) resolve as last-wins with a WARN log identifying
    // the operation, the contested status, and the conflicting payloads.
    repeated .engine.protoc.openapi.ErrorResponse error_responses = 4;
}

// Shortcut declaration of an error scenario on a single operation.  Each entry expands at
// compile time into a `responses[status]` entry whose schema is an inline `google.rpc.Status`
// body carrying a typed `details.items` $ref.  The Status envelope is always inlined and
// never lands in `components/schemas`.  Mirrors `Operation.responses` in expressive power
// for the common error-shape case, without requiring the user to write the full nested tree.
//
// This is DSL sugar for the `(engine.protoc.openapi.method)` annotation, not part of the
// emitted OpenAPI model — hence it lives here alongside the annotation wrappers rather than
// under the `model` package.
message ErrorResponse {
    // HTTP status code emitted on the operation's `responses` map.  Accepts any OAS-legal
    // key: a numeric string ("400", "409"), an OAS range ("4XX"), or "default".
    string status = 1;

    // The proto message describing the error payload.  Authored using the bracketed
    // `google.protobuf.Any` textual syntax — for example:
    //
    //     error_type: { [type.googleapis.com/booking.v1.BookError] {} }
    //
    // The empty `{}` body is intentional: only the resolved type is consulted, the value
    // is ignored.  The referenced message is added to `components/schemas` as a normal
    // component.  The surrounding `google.rpc.Status` envelope is always inlined at the
    // use site and never registered as a component.
    .google.protobuf.Any error_type = 2;

    // Optional response description.  When omitted, falls back to the error message's
    // leading proto comment, then to the string "Error".
    optional string description = 3;

    // Optional gRPC status code associated with this error scenario.  When present:
    //   • emitted as the `x-grpc-code` vendor extension (string enum name) on the
    //     response object;
    //   • seeds an `examples` entry on the response media type whose `value.code` is the
    //     gRPC code's integer number.
    optional .google.rpc.Code grpc_code = 4;
}

// Message-level OpenAPI annotation: applied via `(engine.protoc.openapi.message)` on a proto message.
message Message {
    // OpenAPI schema merged on top of the auto-derived schema for this proto message.
    .engine.protoc.openapi.model.Schema schema = 1;
}

// Field-level OpenAPI annotation: applied via `(engine.protoc.openapi.field)` on a proto field.
message Field {
    // OpenAPI schema merged on top of the auto-derived schema for this proto field.
    .engine.protoc.openapi.model.Schema schema = 1;

    // When true on a message-typed field, the referenced message's schema is inlined at the
    // field site instead of emitted as a `$ref` into `components/schemas`.  Transitive:
    // messages reached only through this inline path are themselves inlined; messages also
    // reachable through a non-inlined path remain in components and are `$ref`'d from the
    // inline expansion.  Ignored on scalar fields; the per-enum `(engine.protoc.openapi.enum)`
    // `inline` flag continues to govern enum inlining.
    optional bool inline = 2;
}

// Enum-level OpenAPI annotation: applied via `(engine.protoc.openapi.enum)` on a proto enum.
message Enum {
    // OpenAPI schema merged on top of the auto-derived schema for this proto enum.
    .engine.protoc.openapi.model.Schema schema = 1;

    // When true, this enum will be inlined wherever it's used instead of emitted as a separate
    // schema in `components/schemas`.
    optional bool inline = 2;
}

// EnumValue-level OpenAPI annotation: applied via `(engine.protoc.openapi.enum_value)` on a proto
// enum value.
message EnumValue {
    // When true, suppress this enum value from OAS schema output.  Helpful for the conventional
    // "default" value of proto enums with the assigned 0 number.
    optional bool suppress = 1;
}

extend .google.protobuf.FileOptions {
    .engine.protoc.openapi.File file = 1308;
}

extend .google.protobuf.ServiceOptions {
    .engine.protoc.openapi.Service service = 1308;
}

extend .google.protobuf.MethodOptions {
    .engine.protoc.openapi.Method method = 1308;
}

extend .google.protobuf.MessageOptions {
    .engine.protoc.openapi.Message message = 1308;
}

extend .google.protobuf.FieldOptions {
    .engine.protoc.openapi.Field field = 1308;
}

extend .google.protobuf.EnumOptions {
    .engine.protoc.openapi.Enum enum = 1308;
}

extend .google.protobuf.EnumValueOptions {
    .engine.protoc.openapi.EnumValue enum_value = 1308;
}
