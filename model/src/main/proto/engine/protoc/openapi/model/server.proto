syntax = "proto3";

package engine.protoc.openapi.model;

import "engine/protoc/openapi/model/server_variable.proto";

// An object representing a Server.
message Server {
  // REQUIRED.
  // A URL to the target host.
  // This URL supports Server Variables and MAY be relative, to indicate that the host location is relative to the location where the document containing the Server Object is being served.
  // Variable substitutions will be made when a variable is named in {braces}.
  string url = 1;

  // An optional string describing the host designated by the URL.
  // [CommonMark](https://spec.commonmark.org/) syntax MAY be used for rich text representation.
  string description = 2;

  // A map between a variable name and its value.
  // The value is used for substitution in the server's URL template.
  map<string, .engine.protoc.openapi.model.ServerVariable> variables = 3;
}
