syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/operation.proto";
import "engine/protoc/openapi/model/parameter_or_reference.proto";
import "engine/protoc/openapi/model/server.proto";

// Describes the operations available on a single path.
// A Path Item MAY be empty, due to [ACL constraints](https://swagger.io/specification/#security-filtering).
// The path itself is still exposed to the documentation viewer but they will not know which operations and parameters are available.
message PathItem {
  oneof ref_type {
    // Allows for a referenced definition of this path item.
    // The value MUST be in the form of a URI, and the referenced structure MUST be in the form of a Path Item Object.
    // In case a Path Item Object field appears both in the defined object and the referenced object, the behavior is undefined.
    // See the rules for resolving Relative References.
    //
    // _**Note**: The behavior of `$ref` with adjacent properties is likely to change in future versions of this specification to bring it into closer alignment with the behavior of the [Reference Object](https://swagger.io/specification/#reference-object)._
    string uri_ref = 1;

    // A fully qualified service and method name used to resolve a path item from the protoc
    // compilation context, for example:
    // `engine.shop.lodging.service.v1.LodgingShoppingService#FindBestOffers`
    // The referenced RPC must exist, have a `(google.api.http)` option, and be present in the
    // set of files passed to the current protoc invocation.
    string proto_ref = 2;
  }

  // An optional string summary, intended to apply to all operations in this path.
  optional string summary = 3;

  // An optional string description, intended to apply to all operations in this path.
  // [CommonMark syntax](https://spec.commonmark.org/) MAY be used for rich text representation.
  optional string description = 4;

  // A definition of a GET operation on this path.
  .engine.protoc.openapi.Operation get = 5;

  // A definition of a PUT operation on this path.
  .engine.protoc.openapi.Operation put = 6;

  // A definition of a POST operation on this path.
  .engine.protoc.openapi.Operation post = 7;

  // A definition of a DELETE operation on this path.
  .engine.protoc.openapi.Operation delete = 8;

  // A definition of a OPTIONS operation on this path.
  .engine.protoc.openapi.Operation options = 9;

  // A definition of a HEAD operation on this path.
  .engine.protoc.openapi.Operation head = 10;

  // A definition of a PATCH operation on this path.
  .engine.protoc.openapi.Operation patch = 11;

  // A definition of a TRACE operation on this path.
  .engine.protoc.openapi.Operation trace = 12;

  // An alternative `servers` array to service all operations in this path.
  // If a `servers` array is specified at the [OpenAPI Object](https://swagger.io/specification/#oas-servers) level, it will be overridden by this value.
  repeated .engine.protoc.openapi.model.Server servers = 13;

  // A list of parameters that are applicable for all the operations described under this path.
  // These parameters can be overridden at the operation level, but cannot be removed there.
  // The list MUST NOT include duplicated parameters.
  // A unique parameter is defined by a combination of a [name](https://swagger.io/specification/#parameter-name) and [location](https://swagger.io/specification/#parameter-in).
  // The list can use the [Reference Object](https://swagger.io/specification/#reference-object) to link to parameters that are defined in the [OpenAPI Object's `components.parameters`](https://swagger.io/specification/#components-parameters).
  repeated .engine.protoc.openapi.model.ParameterOrReference parameters = 14;
}
