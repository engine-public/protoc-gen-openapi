syntax = "proto3";

package engine.protoc.openapi;

option java_package = "com.engine.protoc.openapi";
option java_multiple_files = true;
option java_outer_classname = "OpenAPIProto";

import "engine/protoc/openapi/model/components.proto";
import "engine/protoc/openapi/model/external_documentation.proto";
import "engine/protoc/openapi/model/info.proto";
import "engine/protoc/openapi/model/paths.proto";
import "engine/protoc/openapi/model/path_item_or_reference.proto";
import "engine/protoc/openapi/model/security_requirement.proto";
import "engine/protoc/openapi/model/server.proto";
import "engine/protoc/openapi/model/tag.proto";

// This is the root object of the OpenAPI Description.
// @See https://swagger.io/specification/#openapi-object
message OpenAPI {

  // REQUIRED.
  // This string MUST be the [version number](https://swagger.io/specification/#versions) of the OpenAPI Specification that the OpenAPI Document uses.
  // The `openapi` field SHOULD be used by tooling to interpret the OpenAPI Document.
  // This is _not_ related to the API [info.version](https://swagger.io/specification/#info-version) string.
  //
  // protoc info: While this field is required in OpenAPI, it is optional in this spec to allow for overrides.
  // If not provided, will default to 3.1.0
  optional string openapi = 1;

  // REQUIRED.
  // Provides metadata about the API.
  // The metadata MAY be used by tooling as required.
  .engine.protoc.openapi.model.Info info = 2;

  // The default value for the `$schema` keyword within [Schema Objects](https://swagger.io/specification/#schema-object) contained within this OAS document.
  // This MUST be in the form of a URI.
  optional string json_schema_dialect = 3;

  // An array of Server Objects, which provide connectivity information to a target server.
  // If the `servers` field is not provided, or is an empty array, the default value would be a [Server Object](https://swagger.io/specification/#server-object) with a [url](https://swagger.io/specification/#server-url) value of `/`.
  repeated .engine.protoc.openapi.model.Server servers = 4;

  // The available paths and operations for the API.
  // This is not defined in the protos because it is delegated to the `google.api.http` extensions.
  .engine.protoc.openapi.model.Paths paths = 5;

  // The incoming webhooks that MAY be received as part of this API and that the API consumer MAY choose to implement.
  // Closely related to the `callbacks` feature, this section describes requests initiated other than by an API call, for example by an out of band registration.
  // The key name is a unique string to refer to each webhook, while the (optionally referenced) Path Item Object describes a request that may be initiated by the API provider and the expected responses.
  // An [example](https://learn.openapis.org/examples/v3.1/webhook-example.html) is available.
  map<string, .engine.protoc.openapi.model.PathItemOrReference> webhooks = 6;

  // An element to hold various Objects for the OpenAPI Description.
  .engine.protoc.openapi.model.Components components = 7;

  // A declaration of which security mechanisms can be used across the API.
  // The list of values includes alternative Security Requirement Objects that can be used.
  // Only one of the Security Requirement Objects need to be satisfied to authorize a request.
  // Individual operations can override this definition.
  // The list can be incomplete, up to being empty or absent.
  // To make security explicitly optional, an empty security requirement (`{}`) can be included in the array.
  repeated .engine.protoc.openapi.model.SecurityRequirement security = 8;

  // A list of tags used by the OpenAPI Description with additional metadata.
  // The order of the tags can be used to reflect on their order by the parsing tools.
  // Not all tags that are used by the [Operation Object](https://swagger.io/specification/#operation-object) must be declared.
  // The tags that are not declared MAY be organized randomly or based on the tools' logic.
  // Each tag name in the list MUST be unique.
  repeated .engine.protoc.openapi.model.Tag tags = 9;

  // Additional external documentation.
  .engine.protoc.openapi.model.ExternalDocumentation external_docs = 10;
}
