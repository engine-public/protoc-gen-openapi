syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/model/header_or_reference.proto";
import "engine/protoc/openapi/model/link_or_reference.proto";
import "engine/protoc/openapi/model/media_type.proto";

// Describes a single response from an API operation, including design-time, static `links` to operations based on the response.
message ResponseObject {

  // REQUIRED.
  // A description of the response.
  // [CommonMark syntax](https://spec.commonmark.org/) MAY be used for rich text representation.
  string description = 1;

  // Maps a header name to its definition.
  // [RFC7230](https://tools.ietf.org/html/rfc7230#section-3.2) states header names are case insensitive.
  // If a response header is defined with the name `"Content-Type"`, it SHALL be ignored.
  map<string, .engine.protoc.openapi.model.HeaderOrReference> headers = 2;

  // A map containing descriptions of potential response payloads.
  // The key is a media type or [media type range](https://tools.ietf.org/html/rfc7231#appendix--d) and the value describes it.
  // For responses that match multiple keys, only the most specific key is applicable. e.g. `"text/plain"` overrides `"text/*"`
  map<string, .engine.protoc.openapi.model.MediaType> content = 3;

  // A map of operations links that can be followed from the response.
  // The key of the map is a short name for the link, following the naming constraints of the names for [Component Objects](https://swagger.io/specification/#components-object).
  map<string, .engine.protoc.openapi.model.LinkOrReference> links = 4;
}
