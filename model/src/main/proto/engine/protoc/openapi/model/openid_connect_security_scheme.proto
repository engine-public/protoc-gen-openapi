syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;
option java_outer_classname = "OpenIDConnectSecuritySchemeProto";

message OpenIDConnectSecurityScheme {
  // REQUIRED.
  // Well-known URL to discover the [[OpenID-Connect-Discovery]] provider metadata.
  // This MUST be in the form of a URL and MUST use TLS.
  string openid_connect_url = 1;
}
