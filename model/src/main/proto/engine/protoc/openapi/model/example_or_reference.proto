syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/model/example.proto";
import "engine/protoc/openapi/model/reference.proto";

message ExampleOrReference {
  oneof type {
    .engine.protoc.openapi.model.Example example = 1;
    .engine.protoc.openapi.model.Reference reference = 2;
  }
}
