syntax = "proto3";

package engine.protoc.openapi.example.merged;

option java_package = "com.engine.protoc.openapi.example.merged";
option java_multiple_files = true;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "widget.proto";

// This guy does some really heavy stuff.
service SecondaryService {
    rpc AnotherThingToDoWithWidgets(.google.protobuf.Empty) returns (Widget) {
        option (.google.api.http) = {
            post: "/widget"
        };
    };
}
