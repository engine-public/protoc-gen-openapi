syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/model/contact.proto";
import "engine/protoc/openapi/model/license.proto";

// The object provides metadata about the API.
// The metadata MAY be used by the clients if needed, and MAY be presented in editing or documentation generation tools for convenience.
message Info {
  // REQUIRED.
  // The title of the API.
  //
  // protoc information: While `title` is required in the OpenAPI spec, it is optional here to allow overlaying details from other sources.
  optional string title = 1;

  // A short summary of the API.
  optional string summary = 2;

  // A description of the API.
  // [CommonMark syntax](https://spec.commonmark.org/) MAY be used for rich text representation.
  optional string description = 3;

  // A URI for the Terms of Service for the API.
  // This MUST be in the form of a URI.
  optional string termsOfService = 4;

  // The contact information for the exposed API.
  optional .engine.protoc.openapi.model.Contact contact = 5;

  // The license information for the exposed API.
  optional .engine.protoc.openapi.model.License license = 6;

  // REQUIRED.
  // The version of the OpenAPI Document (which is distinct from the [OpenAPI Specification version](https://swagger.io/specification/#oas-version) or the version of the API being described or the version of the OpenAPI Description).
  //
  // protoc information: While `version` is required in the OpenAPI spec, it is optional here to allow overlaying details from other sources.
  optional string version = 7;
}
