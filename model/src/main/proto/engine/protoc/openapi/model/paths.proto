syntax = "proto3";

package engine.protoc.openapi.model;

import "engine/protoc/openapi/model/path_item.proto";

// Holds the relative paths to the individual endpoints and their operations.
// The path is appended to the URL from the [Server Object](https://swagger.io/specification/#server-object) in order to construct the full URL.
// The Paths Object MAY be empty, due to [Access Control List (ACL) constraints](https://swagger.io/specification/#security-filtering).
//
// **Structural note**: The OpenAPI Paths Object is defined as a plain map (not an object with
// a named field containing the map). This message wraps the map in a `paths` field because
// protobuf requires maps to live inside a message. Serializers MUST unwrap the `paths` field
// when emitting JSON/YAML — the output should be a top-level object whose keys are path strings,
// not an object with a `paths` key.
message Paths {
  // A relative path to an individual endpoint.
  // The field name MUST begin with a forward slash (/).
  // The path is appended (no relative URL resolution) to the expanded URL from the Server Object's url field in order to construct the full URL.
  // Path templating is allowed.
  // When matching URLs, concrete (non-templated) paths would be matched before their templated counterparts.
  // Templated paths with the same hierarchy but different templated names MUST NOT exist as they are identical.
  // In case of ambiguous matching, it's up to the tooling to decide which one to use.
  map<string, .engine.protoc.openapi.model.PathItem> paths = 1;
}
