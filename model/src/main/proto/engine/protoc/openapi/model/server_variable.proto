syntax = "proto3";

package engine.protoc.openapi.model;

// An object representing a Server Variable for server URL template substitution.
message ServerVariable {
  // An enumeration of string values to be used if the substitution options are from a limited set.
  // The array MUST NOT be empty.
  repeated string enum = 1;

  // REQUIRED.
  // The default value to use for substitution, which SHALL be sent if an alternate value is not supplied.
  // If the [enum] is defined, the value MUST exist in the enum's values.
  // Note that this behavior is different from the [Schema Object](https://swagger.io/specification/#schema-object)'s `default` keyword, which documents the receiver's behavior rather than inserting the value into the data.
  //
  // protoc info: While this field is required in OpenAPI, it is optional in this spec to allow for overrides.
  optional string default = 2;

  // An optional description for the server variable.
  // [CommonMark syntax](https://spec.commonmark.org/) MAY be used for rich text representation.
  optional string description = 3;
}
