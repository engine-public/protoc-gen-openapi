syntax = "proto3";
package engine.protoc.utils;
import "google/protobuf/empty.proto";
import "engine/protoc/utils/registered_extensions.proto";
import "engine/protoc/utils/unregistered_extensions.proto";
option (.engine.protoc.utils.registered_example) = {
    one: 1
};
option (.engine.protoc.utils.unregistered_example) = {
    two: 2
};
enum ExtensionEnum {
    option (.engine.protoc.utils.registered_enum_example) = {
        three: 3
    };
    option (.engine.protoc.utils.unregistered_enum_example) = {
        four: 4
    };
    EXTENSION_ENUM_DEFAULT = 0;
}
service ExtensionService {
    option (.engine.protoc.utils.registered_service_example) = {
        five: 5
    };
    option (.engine.protoc.utils.unregistered_service_example) = {
        seven: 7
    };
    rpc ExtensionMethod(google.protobuf.Empty) returns (google.protobuf.Empty) {
        option (.engine.protoc.utils.registered_method_example) = {
            six: 6
        };
        option (.engine.protoc.utils.unregistered_method_example) = {
            eight: 8
        };
    }
}
