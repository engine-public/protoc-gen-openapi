syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;
option java_outer_classname = "OAuthFlowProto";

// Configuration details for a supported OAuth Flow
message OAuthFlow {
  // REQUIRED for flows: "implicit", "authorizationCode".
  // The authorization URL to be used for this flow.
  // This MUST be in the form of a URL.
  // The OAuth2 standard requires the use of TLS.
  optional string authorization_url = 1;

  // REQUIRED for flows: "password", "clientCredentials", "authorizationCode".
  // The token URL to be used for this flow.
  // This MUST be in the form of a URL.
  // The OAuth2 standard requires the use of TLS.
  optional string token_url = 2;

  // The URL to be used for obtaining refresh tokens.
  // This MUST be in the form of a URL.
  // The OAuth2 standard requires the use of TLS.
  optional string refresh_url = 3;

  // REQUIRED.
  // The available scopes for the OAuth2 security scheme.
  // A map between the scope name and a short description for it.
  // The map MAY be empty.
  map<string, string> scopes = 4;
}
