syntax = "proto3";

package engine.protoc.openapi.model;

message HTTPSecurityScheme {
  // REQUIRED.
  // The name of the HTTP Authentication scheme to be used in the [Authorization header as defined in RFC7235](https://tools.ietf.org/html/rfc7235#section-5.1).
  // The values used SHOULD be registered in the [IANA Authentication Scheme registry](https://www.iana.org/assignments/http-authschemes/http-authschemes.xhtml).
  // The value is case-insensitive, as defined in [RFC7235](https://datatracker.ietf.org/doc/html/rfc7235#section-2.1).
  string scheme = 1;

  // A hint to the client to identify how the bearer token is formatted.
  // Bearer tokens are usually generated by an authorization server, so this information is primarily for documentation purposes.
  optional string bearer_format = 2;
}
