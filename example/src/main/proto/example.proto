syntax = "proto3";

import "engine/protoc/openapi/annotations.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option (engine.protoc.openapi.file_level_openapi) = {
    info: {
        title: "protoc-gen-openapi-example"
        summary: "An example project created to demonstrate the protoc-gen-openapi plugin."
        description: ""
        contact: {
            name: "Engine Partner API Support"
            url: "https://github.com/engine-public/engine-partner-api"
            email: "partner-api-support@engine.com"
        },
        license: {
            name: "Apache License 2.0",
            url: "https://github.com/engine-public/engine-partner-api/blob/main/LICENSE"
        },
        version: "12.34.56"
    }
    servers: [{
        url: "https://example.com",
        description: "Primary host"
    }, {
        url: "https://example.org"
        description: "Secondary host"
    }]
    components: {
        security_schemes: [{
            key: "mTLS"
            value: {
                security_scheme: {
                    description: "This API requires a certificate provisioned by the Engine team."
                    mutual_tls: {}
                }
            }
        }]
    },
    security: [{
        names: [{
            key: "mTLS"
            value: {}
        }]
    }],
    external_docs: {
        description: "protoc-gen-openapi GitHub"
        url: "https://github.com/HotelEngine/protoc-gen-openapi"
    }
};

// Service comment
service ExampleService {
    // RPC comment
    rpc GetParent(GetParentRequest) returns (Parent) {
        option (google.api.http) = {
            post: "/parent"
            body: "*"
            additional_bindings: [
                {
                    get: "/example/{id}"
                }
            ]
        };
    };

    rpc GetChild(GetChildRequest) returns (Child) {
        option (google.api.http) = {
            post: "/child"
            body: "*"
            additional_bindings: [
                {
                    get: "/parent/{child.parent_id}/child/{id.id}"
                    body: ""
                }
            ]
        };
    }
}

message GetParentRequest {
    int32 id = 1;
}

message Parent {
    int32 id = 1;
    string name = 2;
    optional Child child = 3;
}

message GetChildRequest {
    Child child = 1;
}

message Child {
    message Id {
        int32 id = 1;
    }
    int32 parent_id = 1;
    Child.Id id = 2;
}
