syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/model/api_key_security_scheme.proto";
import "engine/protoc/openapi/model/http_security_scheme.proto";
import "engine/protoc/openapi/model/mtls_security_scheme.proto";
import "engine/protoc/openapi/model/oauth_security_scheme.proto";
import "engine/protoc/openapi/model/openid_connect_security_scheme.proto";
import "google/protobuf/struct.proto";

// Defines a security scheme that can be used by the operations.
//
// Supported schemes are HTTP authentication, an API key (either as a header, a cookie parameter or as a query parameter), mutual TLS (use of a client certificate), OAuth2's common flows (implicit, password, client credentials and authorization code) as defined in [RFC6749](https://tools.ietf.org/html/rfc6749), and [[OpenID-Connect-Core]].
// Please note that as of 2020, the implicit flow is about to be deprecated by [OAuth 2.0 Security Best Current Practice](https://tools.ietf.org/html/draft-ietf-oauth-security-topics).
// Recommended for most use cases is Authorization Code Grant flow with PKCE.
message SecurityScheme {
  // A description for security scheme.
  // [CommonMark syntax](https://spec.commonmark.org/) MAY be used for rich text representation.
  optional string description = 1;

  oneof type {
    .engine.protoc.openapi.model.APIKeySecurityScheme api_key = 2;
    .engine.protoc.openapi.model.HTTPSecurityScheme http = 3;
    .engine.protoc.openapi.model.MutualTLSSecurityScheme mutual_tls = 4;
    .engine.protoc.openapi.model.OAuthSecurityScheme oauth2 = 5;
    .engine.protoc.openapi.model.OpenIDConnectSecurityScheme open_id_connect = 6;
  }

  // Extensions (also referred to as specification extensions or vendor extensions) are custom
  // properties that start with x-, such as x-logo. These are used to add extra information or
  // functionality that the OpenAPI standard doesn't include by default. For example, many tools
  // including Amazon API Gateway, ReDoc, APIMatic, and Fern use extensions to include details
  // specific to their products.
  // Extensions are supported on the root level of the API spec and in the following places:
  //   info section, paths section, individual paths and operations, operation parameters,
  //   responses, tags, and security schemes.
  // The extension value can be a primitive, an array, an object or null. If the value is an
  // object or array of objects, the object's property names do not need to start with x-.
  map<string, google.protobuf.Value> extensions = 7;
}
