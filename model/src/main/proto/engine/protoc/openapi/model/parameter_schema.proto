syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/schema.proto";
import "engine/protoc/openapi/model/example_or_reference_map.proto";
import "google/protobuf/any.proto";

// For simpler scenarios, a [schema](https://swagger.io/specification/#parameter-schema) and [style](https://swagger.io/specification/#parameter-style) can describe the structure and syntax of the parameter.
// When `example` or `examples` are provided in conjunction with the `schema` field, the example SHOULD match the specified schema and follow the prescribed serialization strategy for the parameter.
// The `example` and `examples` fields are mutually exclusive, and if either is present it SHALL _override_ any `example` in the schema.
//
// Serializing with `schema` is NOT RECOMMENDED for `in: "cookie"` parameters, `in: "header"` parameters that use HTTP header parameters (name=value pairs following a `;`) in their values, or `in: "header"` parameters where values might have non-URL-safe characters; see [Appendix D](https://swagger.io/specification/#appendix-d-serializing-headers-and-cookies) for details.
//
// See also [Appendix C: Using RFC6570-Based Serialization](https://swagger.io/specification/#appendix-c-using-rfc6570-based-serialization) for additional guidance.
message ParameterSchema {
  // Describes how the parameter value will be serialized depending on the type of the parameter value.
  // Default values (based on value of `in`): for `"query"` - `"form"`; for `"path"` - `"simple"`; for `"header"` - `"simple"`; for `"cookie"` - `"form"`.
  // TODO https://swagger.io/specification/#parameter-style revisit "Style Values"
  optional string style = 1;

  // When this is true, parameter values of type `array` or `object` generate separate parameters for each value of the array or key-value pair of the map.
  // For other types of parameters this field has no effect.
  // When [style](https://swagger.io/specification/#parameter-style) is `"form"`, the default value is `true`.
  // For all other styles, the default value is `false`.
  // Note that despite false being the default for deepObject, the combination of false with deepObject is undefined.
  optional bool explode = 2;

  // When this is true, parameter values are serialized using reserved expansion, as defined by [RFC6570](https://datatracker.ietf.org/doc/html/rfc6570#section-3.2.3), which allows [RFC3986's reserved character set](https://datatracker.ietf.org/doc/html/rfc3986#section-2.2), as well as percent-encoded triples, to pass through unchanged, while still percent-encoding all other disallowed characters (including % outside of percent-encoded triples).
  // Applications are still responsible for percent-encoding reserved characters that are [not allowed in the query string](https://datatracker.ietf.org/doc/html/rfc3986#section-3.4) (`[`, `]`, `#`), or have a special meaning in `application/x-www-form-urlencoded` (`-`, `&`, `+`); see Appendices [C](https://swagger.io/specification/#appendix-c-using-rfc6570-based-serialization) and [E](https://swagger.io/specification/#appendix-e-percent-encoding-and-form-media-types) for details.
  // This field only applies to parameters with an in value of `query`.
  // The default value is `false`.
  optional bool allow_reserved = 3;

  // The schema defining the type used for the parameter.
  .engine.protoc.openapi.Schema schema = 4;

  oneof example_type {
    // Example of the parameter's potential value; see [Working With Examples](https://swagger.io/specification/#working-with-examples).
    // The `example` field and the `examples` field are mutually exclusive.
    // If either is present, it SHALL override any `example` in the schema.
    .google.protobuf.Any example = 5;

    // Examples of the parameter's potential value; see [Working With Examples](https://swagger.io/specification/#working-with-examples).
    // The `example` field and the `examples` field are mutually exclusive.
    // If either is present, it SHALL override any `example` in the schema.
    .engine.protoc.openapi.model.ExampleOrReferenceMap examples = 6;
  }
}
