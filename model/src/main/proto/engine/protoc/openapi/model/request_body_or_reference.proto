syntax = "proto3";

package engine.protoc.openapi.model;

option java_package = "com.engine.protoc.openapi.model";
option java_multiple_files = true;

import "engine/protoc/openapi/model/request_body.proto";
import "engine/protoc/openapi/model/reference.proto";

message RequestBodyOrReference {
  oneof type {
    .engine.protoc.openapi.model.RequestBody request_body = 1;
    .engine.protoc.openapi.model.Reference reference = 2;
  }
}
