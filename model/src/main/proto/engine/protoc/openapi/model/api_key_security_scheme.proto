syntax = "proto3";

package engine.protoc.openapi.model;

message APIKeySecurityScheme {
  // REQUIRED.
  // The name of the header, query or cookie parameter to be used.
  string name = 1;

  // REQUIRED.
  // The location of the API key.
  // Valid values are "query", "header", or "cookie".
  string in = 2;
}
